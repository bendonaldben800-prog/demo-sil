<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Key Monitor Downloads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape bg-a" aria-hidden="true"></div>
  <div class="bg-shape bg-b" aria-hidden="true"></div>

  <main class="page">
    <section class="hero card fade-in">
      <p class="kicker">Ethical Telemetry Tools</p>
      <h1>Download the right Key Monitor app for your device</h1>
      <p class="subtext">
        Metadata-only keyboard monitoring. No typed text reconstruction, no clipboard capture, and no field content logging.
      </p>

      <div class="primary-cta">
        <p id="detectedLabel">Detecting your device...</p>
        <a id="downloadBtn" class="button" href="#" aria-disabled="true">Preparing download...</a>
      </div>

      <div class="manual-select">
        <label for="platformSelect">Choose manually</label>
        <select id="platformSelect">
          <option value="">Select a platform</option>
          <option value="windows-x64">Windows x64</option>
          <option value="windows-arm64">Windows ARM64</option>
          <option value="macos-intel">macOS Intel</option>
          <option value="macos-arm64">macOS Apple Silicon</option>
        </select>
        <button id="manualApply" class="button secondary" type="button">Use this version</button>
      </div>
    </section>

    <section class="card fade-in delayed">
      <h2>Available downloads</h2>
      <ul id="downloadList" class="download-list"></ul>
    </section>

    
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
